<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chingchang - nginx</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 700px;
            width: 100%;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 0.4rem 1.2rem;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            color: #a0c4ff;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #a0c4ff, #c0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 3rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.2rem;
            transition: background 0.2s ease;
        }

        .info-card:hover {
            background: rgba(255, 255, 255, 0.09);
        }

        .info-card .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 0.4rem;
        }

        .info-card .value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e0e0ff;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Deployed with Ansible</div>
        <div class="logo">🚀</div>
        <h1>chingchang</h1>
        <p class="subtitle">nginx is running successfully on EC2</p>

        <div class="info-grid">
            <div class="info-card">
                <div class="label">Project</div>
                <div class="value">chingchang</div>
            </div>
            <div class="info-card">
                <div class="label">App</div>
                <div class="value">nginx</div>
            </div>
            <div class="info-card">
                <div class="label">Region</div>
                <div class="value">ap-southeast-1</div>
            </div>
            <div class="info-card">
                <div class="label">Target</div>
                <div class="value">EC2</div>
            </div>
        </div>

        <div class="status">
            <div class="status-dot"></div>
            Server is online and serving requests
        </div>
    </div>
</body>
</html>
